<!DOCTYPE html>

      }
      .glass-panel {
        background: rgba(50, 53, 60, 0.4);
        backdrop-filter: blur(24px);
      }
      .glow-primary {
        box-shadow: 0 0 20px rgba(93, 33, 223, 0.3);
      }
      body {
        min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
<header class="bg-[#10131a]/60 backdrop-blur-2xl docked full-width top-0 z-50 tonal-transition bg-gradient-to-b from-[#10131a] to-transparent flat no-shadows flex justify-between items-center w-full px-6 h-16 fixed">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-indigo-400 dark:text-indigo-300" data-icon="auto_awesome">auto_awesome</span>
<h1 class="text-xl font-black text-indigo-50 tracking-tighter">Lumia AI</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer">
<img alt="User Profile" data-alt="close-up portrait of a digital artist with colorful studio lighting reflected on their glasses in a cyberpunk aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsHx0mDMq5PA-VVEiHNs7uleBnk2B_tKs0GU2vNG0FkCtwQWuNbfBSoAnpl7lxgM9-2PavHbythL9i8eMcPinL0_EI6gWc6uAXJCMTsIACaaNRGcHrsDgAGWFMaDUQ-Y5qBRZeokhq9QerL7un-BnB2xpqUjcdx3ExpgLR7di0YE2i2xifJPGBchm28GsnuMW7HEtjaTAleB5xdPiFy3Uq8kWyg14A3DbdC4aUWDRZx4oFcPo6ZFfXZQ31jM_i0WAcPab5eOlSyAZM"/>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-5xl mx-auto w-full flex flex-col gap-8">
<section class="flex flex-col gap-2">
<h2 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface">Creation</h2>
<p class="text-on-surface-variant font-body text-lg max-w-xl">Manifest your imagination into stunning digital realities with our ethereal generation engine.</p>
</section>
<section class="flex flex-col gap-6 w-full">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-primary-container to-tertiary opacity-10 blur-xl group-focus-within:opacity-25 transition-opacity"></div>
<div class="relative bg-surface-container-highest rounded-xl overflow-hidden">
<textarea class="w-full min-h-[240px] p-8 bg-transparent border-none focus:ring-0 text-xl font-body text-on-surface placeholder:text-on-surface-variant/40 resize-none leading-relaxed" placeholder="Describe your masterpiece..."></textarea>
<div class="absolute bottom-4 right-4 flex items-center gap-3">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-variant/40 hover:bg-surface-variant/60 text-primary transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="tune">tune</span>
<span class="font-label text-sm font-semibold tracking-wide uppercase">Parameters</span>
</button>
</div>
</div>
</div>
</section>
<section class="mt-4">
<button class="w-full py-5 rounded-xl bg-gradient-to-br from-primary-container to-primary text-on-primary font-headline text-lg font-extrabold tracking-tight hover:brightness-110 transition-all duration-300 active:scale-[0.98] shadow-[0_10px_40px_rgba(93,33,223,0.3)] flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>
            GENERATE MASTERPIECE
        </button>
</section>
</main>

<a class="flex flex-col items-center justify-center text-[#00daf3] drop-shadow-[0_0_10px_rgba(0,218,243,0.4)] transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="magic_button" style="font-variation-settings: 'FILL' 1;">magic_button</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-[0.05em]">Creation</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-indigo-200 transition-all duration-300 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-[0.05em]">Gallery</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-indigo-200 transition-all duration-300 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-inter text-[10px] font-semibold uppercase tracking-[0.05em]">Settings</span>
</a>
</nav>
<div class="fixed inset-0 pointer-events-none overflow-hidden z-[-1]">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary-container/10 blur-[100px] rounded-full"></div>
</div>
